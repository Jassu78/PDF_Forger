# GitHub Pages: Deploy project site
# Publishes a minimal project page. Enable Pages in repo Settings → Pages → Source: GitHub Actions
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index
        run: |
          mkdir -p _site
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>PDF Forger</title>
            <style>
              :root { --bg: #0d1117; --fg: #c9d1d9; --accent: #58a6ff; }
              * { box-sizing: border-box; }
              body { font-family: system-ui,sans-serif; background: var(--bg); color: var(--fg); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
              h1 { font-size: 2.5rem; margin: 0 0 0.5rem; }
              p { opacity: 0.8; margin: 0 0 1.5rem; }
              a { color: var(--accent); }
              .badge { display: inline-block; background: rgba(88,166,255,.15); padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.875rem; margin: 0.5rem 0.25rem 0 0; }
            </style>
          </head>
          <body>
            <h1>PDF Forger</h1>
            <p>Android app for PDF creation, conversion, merge, split, and more.</p>
            <a href="https://github.com/${{ github.repository }}" class="badge">GitHub</a>
            <a href="https://github.com/${{ github.repository }}/releases" class="badge">Releases</a>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
